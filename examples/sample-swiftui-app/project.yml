name: SampleSwiftUIApp
options:
  bundleIdPrefix: com.swiftuiexplorer.example
packages:
  SwiftPreviewKit:
    path: ../../packages/swift-preview-kit
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  SampleSwiftUIApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SampleSwiftUIApp
    resources:
      - path: SampleSwiftUIApp/Resources
    dependencies:
      - package: SwiftPreviewKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftuiexplorer.example.SampleSwiftUIApp
        INFOPLIST_KEY_CFBundleDisplayName: SwiftUI Explorer Sample
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
